name: Deploy VietFi To Vinahost

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: Production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment secrets
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_APP_DIR: ${{ secrets.DEPLOY_APP_DIR }}
          DEPLOY_TMP_DIR: ${{ secrets.DEPLOY_TMP_DIR }}
          APP_ENV_PRODUCTION: ${{ secrets.APP_ENV_PRODUCTION }}
        run: |
          for key in DEPLOY_HOST DEPLOY_PORT DEPLOY_USER DEPLOY_SSH_KEY DEPLOY_APP_DIR DEPLOY_TMP_DIR APP_ENV_PRODUCTION; do
            if [ -z "${!key}" ]; then
              echo "Missing required production secret: $key" >&2
              exit 1
            fi
          done

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          AI_PROVIDER: trollllm
          TROLL_LLM_API_KEY: test-key
          GEMINI_API_KEY: test-key
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
          CRON_SECRET: test-cron-secret
          ENABLE_NEWS_AI_REVIEW: "0"

      - name: Package release
        run: |
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='playwright-report' \
            --exclude='test-results' \
            --exclude='coverage' \
            -czf release.tgz .

      - name: Upload release package
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          source: release.tgz
          target: ${{ secrets.DEPLOY_TMP_DIR }}

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_ENV_PRODUCTION: ${{ secrets.APP_ENV_PRODUCTION }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          envs: APP_ENV_PRODUCTION
          script: |
            set -e
            mkdir -p "${{ secrets.DEPLOY_APP_DIR }}"
            mkdir -p "${{ secrets.DEPLOY_TMP_DIR }}"
            tar -xzf "${{ secrets.DEPLOY_TMP_DIR }}/release.tgz" -C "${{ secrets.DEPLOY_APP_DIR }}"
            cd "${{ secrets.DEPLOY_APP_DIR }}"
            printf "%s" "$APP_ENV_PRODUCTION" > .env.production
            npm ci
            npm run build
            mkdir -p tmp
            touch tmp/restart.txt
            rm -f "${{ secrets.DEPLOY_TMP_DIR }}/release.tgz"

      - name: Deployment summary
        run: echo "Deployed to https://vietfi.phamphunguyenhung.com"
